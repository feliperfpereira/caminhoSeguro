<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-between overflow-hidden bg-map-overlay">
<!-- Top Branding -->
<header class="w-full flex justify-center pt-16 pb-4 px-8 z-10">
<div class="w-14 h-14 rounded-full bg-primary-container flex items-center justify-center text-tertiary-fixed shadow-xl">
<span class="material-symbols-outlined text-3xl" data-icon="shield">shield</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center px-8 w-full max-w-2xl text-center space-y-12 z-10">
<!-- Hero Section -->
<section class="space-y-4">
<h1 class="font-headline italic text-7xl md:text-8xl text-primary-container tracking-tight leading-tight">
                Caminho Seguro
            </h1>
<div class="flex items-center justify-center gap-2">
<div class="h-[1px] w-8 bg-tertiary-fixed"></div>
<p class="font-body text-lg md:text-xl text-primary-container font-medium">
                    Sua cidade, seu trajeto, mais segurança.
                </p>
<div class="h-[1px] w-8 bg-tertiary-fixed"></div>
</div>
</section>
<!-- Call to Action Cluster -->
<div class="w-full space-y-8 pt-4">
<button class="w-full md:w-80 h-16 bg-primary-container text-on-primary rounded-xl font-body font-bold text-lg tracking-wide hover:bg-opacity-95 active:scale-95 transition-all editorial-shadow">
                Começar
            </button>
<div class="flex flex-col sm:flex-row items-center justify-center gap-6">
<a class="font-label text-sm font-bold text-primary-container/80 hover:text-primary transition-colors border-b-2 border-transparent hover:border-tertiary-fixed pb-1" href="#">
                    Sobre o projeto
                </a>
<span class="hidden sm:block w-1.5 h-1.5 rounded-full bg-tertiary-fixed"></span>
<a class="font-label text-sm font-bold text-primary-container/80 hover:text-primary transition-colors border-b-2 border-transparent hover:border-tertiary-fixed pb-1" href="#">
                    Privacidade
                </a>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="w-full py-12 px-8 flex flex-col items-center z-10">
<div class="h-1 w-16 bg-tertiary-fixed/30 rounded-full mb-6"></div>
<p class="font-label text-[11px] font-bold uppercase tracking-[0.25em] text-primary-container/60 text-center max-w-xs leading-relaxed">
            Dados da SSP-SP atualizados mensalmente para sua proteção
        </p>
</footer>
<!-- Overlay to ensure readability -->
<div class="fixed inset-0 bg-white/40 pointer-events-none -z-10"></div>
